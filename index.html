<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Назва Гри</title>
<style>
  @font-face {
    font-family: 'QuinqueFive';
    src: url(assets/fonts/QuinqueFive.otf) format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --color-white: #f5f7ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'QuinqueFive', monospace;
  }

  .screen {
    position: relative;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1080 / 1920;
    overflow: hidden;
    background: #0a1230;
    box-shadow: 0 0 80px rgba(0,0,0,0.6);
    container-type: inline-size;
  }

  @media (max-width: 480px) {
    .screen { max-width: 100%; height: 100vh; height: 100dvh; aspect-ratio: auto; }
  }

  /* ---------- VIEW SWITCHING (екрани застосунку) ---------- */
  .view {
    position: absolute;
    inset: 0;
  }
  .view[hidden] {
    display: none;
  }

  /* ---------- BACKGROUND ---------- */
  .bg-layer {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .bg-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ---------- CLOUD LAYER (анімація вліво-вправо) ---------- */
  .cloud-layer {
    position: absolute;
    z-index: 1;
    top: 12.5%;
    left: -5%;
    width: 110%;
    pointer-events: none;
    animation: drift-clouds 17s ease-in-out infinite alternate;
  }
  .cloud-layer img {
    display: block;
    width: 100%;
    height: auto;
  }

  @keyframes drift-clouds {
    0%   { transform: translateX(-4%); }
    100% { transform: translateX(4%); }
  }

  @media (prefers-reduced-motion: reduce) {
    .cloud-layer { animation: none; }
  }

  /* ---------- MENU: CONTENT LAYER ---------- */
  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6%;
    padding: 0 7%;
  }

  /* ---------- MENU: TITLE FRAME (буде замінено фінальним зображенням) ---------- */
  .title-frame {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 2373 / 1329;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .title-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
    pointer-events: none;
  }

  .record-bar {
    position: relative;
    width: 100%;
    aspect-ratio: 810 / 82;
  }
  .record-bar__bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .record-bar__content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5%;
    font-size: 2.778cqw;
    color: var(--color-white);
    letter-spacing: 1px;
  }

  .menu-buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn-img {
    display: block;
    width: 100%;
    padding: 0;
    border: none;
    background: none;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.08s ease;
  }
  .btn-img img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    pointer-events: none;
  }
  .btn-img:active {
    transform: scale(0.96) translateY(2px);
    filter: brightness(0.92);
  }

  /* ---------- REGISTER: CONTENT (заплатка, буде доопрацьовано) ---------- */
  .reg-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 7%;
    padding: 0 9%;
    text-align: center;
  }

  .reg-title {
    width: 100%;
    margin: 0;
    font-family: 'QuinqueFive', monospace;
    font-weight: normal;
    font-size: 5.5cqw;
    letter-spacing: 1px;
    color: #ffffff;
    overflow-wrap: break-word;
    text-shadow:
      0 3px 0 #0c2c72,
      0 6px 14px rgba(59, 110, 230, 0.65),
      0 0 20px rgba(110, 170, 255, 0.55);
  }

  .reg-subtitle {
    margin: 0;
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 4.4cqw, 19px);
    line-height: 1.45;
    color: #f3f5ff;
    max-width: 32em;
  }

  .reg-input {
    width: 100%;
    box-sizing: border-box;
    background: rgba(38, 68, 158, 0.55);
    border: 3px solid #eef2ff;
    outline: none;
    padding: 4.2% 4%;
    font-family: 'QuinqueFive', monospace;
    font-size: clamp(11px, 2.9cqw, 15px);
    color: #0c1430;
    letter-spacing: 0.5px;
  }
  .reg-input::placeholder {
    color: #0c1430;
    opacity: 0.7;
  }

  .reg-button {
    position: relative;
    width: 100%;
    padding: 5% 10px;
    font-family: 'QuinqueFive', monospace;
    font-size: clamp(20px, 7cqw, 30px);
    letter-spacing: 2px;
    color: #ffffff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    border: none;
    cursor: pointer;
    background: linear-gradient(180deg, #66e042 0%, #2e9a18 100%);
    box-shadow: 0 0 0 4px #0d3a06, 0 6px 0 #0d3a06;
    clip-path: polygon(
      0 10px, 10px 10px, 10px 0,
      calc(100% - 10px) 0, calc(100% - 10px) 10px, 100% 10px,
      100% calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 100%,
      10px 100%, 10px calc(100% - 10px), 0 calc(100% - 10px)
    );
    transition: transform 0.08s ease;
  }
  .reg-button::before, .reg-button::after {
    content: "";
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.85);
  }
  .reg-button::before { top: 14px; left: 16px; }
  .reg-button::after { bottom: 14px; right: 16px; }
  .reg-button:active {
    transform: scale(0.97) translateY(2px);
    box-shadow: 0 0 0 4px #0d3a06, 0 2px 0 #0d3a06;
  }

  /* ---------- TOAST (тимчасова заглушка переходів) ---------- */
  .toast {
    position: absolute;
    left: 50%;
    bottom: 6%;
    z-index: 3;
    transform: translate(-50%, 12px);
    background: rgba(10, 12, 24, 0.92);
    border: 2px solid #4f6bc9;
    color: var(--color-white);
    font-family: 'QuinqueFive', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    text-align: center;
    max-width: 86%;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  /* ================= GAME VIEW ================= */
  #view-game {
    display: flex;
    flex-direction: column;
  }
  #view-game[hidden] {
    display: none;
  }

  .game-hud {
    position: relative;
    z-index: 2;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2%;
    padding: 2.6% 3.5%;
    background: #1c2540;
    border-bottom: 3px solid #3a5fa8;
  }

  .hud-stats {
    font-family: 'QuinqueFive', monospace;
    font-size: clamp(10px, 3.2cqw, 14px);
    color: #fff;
    line-height: 1.55;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .hud-slots {
    display: flex;
    gap: 2.2cqw;
  }
  .hud-slot {
    width: 8cqw;
    height: 8cqw;
    max-width: 40px;
    max-height: 40px;
    min-width: 24px;
    min-height: 24px;
    background: #3a4565;
    border: 2px solid #4d5a82;
  }

  .hud-lives {
    display: flex;
    gap: 4px;
  }
  .hud-heart-svg {
    width: 5.6cqw;
    height: 4.9cqw;
    max-width: 27px;
    max-height: 24px;
    min-width: 16px;
    min-height: 14px;
    color: #e6342f;
    filter: drop-shadow(1px 1px 0 #6e0f0f);
    transition: opacity 0.2s ease, filter 0.2s ease;
  }
  .hud-heart.lost .hud-heart-svg {
    color: #3a4565;
    filter: none;
    opacity: 0.6;
  }

  .game-stage {
    position: relative;
    z-index: 1;
    flex: 1 1 auto;
    overflow: hidden;
  }
  .game-stage .bg-layer { z-index: 0; }
  #game-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
    z-index: 1;
  }

  .game-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: rgba(8, 12, 28, 0.82);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8%;
  }
  .game-overlay[hidden] { display: none; }

  .game-overlay__panel {
    width: 100%;
    max-width: 360px;
    background: #182238;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5%;
  }

  .go-title {
    margin: 0;
    font-family: 'QuinqueFive', monospace;
    font-size: clamp(20px, 7cqw, 30px);
    color: #ffffff;
    letter-spacing: 1px;
    text-shadow:
      0 3px 0 #6e0f0f,
      0 0 16px rgba(255, 90, 90, 0.5);
  }
  .go-stat {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 4.4cqw, 18px);
    color: #f3f5ff;
  }
  .go-buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 2%;
  }

  .pixel-btn {
    position: relative;
    width: 100%;
    padding: 4.5% 10px;
    font-family: 'QuinqueFive', monospace;
    font-size: clamp(16px, 5.6cqw, 24px);
    letter-spacing: 2px;
    color: #ffffff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    border: none;
    cursor: pointer;
    clip-path: polygon(
      0 10px, 10px 10px, 10px 0,
      calc(100% - 10px) 0, calc(100% - 10px) 10px, 100% 10px,
      100% calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 100%,
      10px 100%, 10px calc(100% - 10px), 0 calc(100% - 10px)
    );
    transition: transform 0.08s ease;
  }
  .pixel-btn::before, .pixel-btn::after {
    content: "";
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.85);
  }
  .pixel-btn::before { top: 12px; left: 14px; }
  .pixel-btn::after { bottom: 12px; right: 14px; }
  .pixel-btn:active { transform: scale(0.97) translateY(2px); }

  .pixel-btn--green {
    background: linear-gradient(180deg, #66e042 0%, #2e9a18 100%);
    box-shadow: 0 0 0 4px #0d3a06, 0 6px 0 #0d3a06;
  }
  .pixel-btn--green:active { box-shadow: 0 0 0 4px #0d3a06, 0 2px 0 #0d3a06; }

  .pixel-btn--blue {
    background: linear-gradient(180deg, #6f8eea 0%, #3f5bb8 100%);
    box-shadow: 0 0 0 4px #14224f, 0 6px 0 #14224f;
  }
  .pixel-btn--blue:active { box-shadow: 0 0 0 4px #14224f, 0 2px 0 #14224f; }

</style>
</head>

    <!-- ===================== ЕКРАН: ГОЛОВНЕ МЕНЮ ===================== -->

          <div class="hud-heart"><svg viewBox="0 0 8 7" class="hud-heart-svg"><g fill="currentColor"><rect x="1" y="0" width="1" height="1"/><rect x="2" y="0" width="1" height="1"/><rect x="5" y="0" width="1" height="1"/><rect x="6" y="0" width="1" height="1"/><rect x="0" y="1" width="1" height="1"/><rect x="1" y="1" width="1" height="1"/><rect x="2" y="1" width="1" height="1"/><rect x="3" y="1" width="1" height="1"/><rect x="4" y="1" width="1" height="1"/><rect x="5" y="1" width="1" height="1"/><rect x="6" y="1" width="1" height="1"/><rect x="7" y="1" width="1" height="1"/><rect x="0" y="2" width="1" height="1"/><rect x="1" y="2" width="1" height="1"/><rect x="2" y="2" width="1" height="1"/><rect x="3" y="2" width="1" height="1"/><rect x="4" y="2" width="1" height="1"/><rect x="5" y="2" width="1" height="1"/><rect x="6" y="2" width="1" height="1"/><rect x="7" y="2" width="1" height="1"/><rect x="0" y="3" width="1" height="1"/><rect x="1" y="3" width="1" height="1"/><rect x="2" y="3" width="1" height="1"/><rect x="3" y="3" width="1" height="1"/><rect x="4" y="3" width="1" height="1"/><rect x="5" y="3" width="1" height="1"/><rect x="6" y="3" width="1" height="1"/><rect x="7" y="3" width="1" height="1"/><rect x="1" y="4" width="1" height="1"/><rect x="2" y="4" width="1" height="1"/><rect x="3" y="4" width="1" height="1"/><rect x="4" y="4" width="1" height="1"/><rect x="5" y="4" width="1" height="1"/><rect x="6" y="4" width="1" height="1"/><rect x="2" y="5" width="1" height="1"/><rect x="3" y="5" width="1" height="1"/><rect x="4" y="5" width="1" height="1"/><rect x="5" y="5" width="1" height="1"/><rect x="3" y="6" width="1" height="1"/><rect x="4" y="6" width="1" height="1"/></g></svg></div>

          <img src="assets/img/game-bg.jpg" alt="">

        <canvas id="game-canvas"></canvas>

        <div class="game-overlay" id="game-overlay" hidden>
          <div class="game-overlay__panel">
            <h2 class="go-title">ГРУ ЗАВЕРШЕНО</h2>
            <p class="go-stat">Збито ворогів: <span id="final-kills">0</span></p>
            <div class="go-buttons">
              <button class="pixel-btn pixel-btn--green" id="btn-retry" type="button">ЩЕ РАЗ</button>
              <button class="pixel-btn pixel-btn--blue" id="btn-game-to-menu" type="button">У МЕНЮ</button>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script>
    function showToast(toastId, text) {
      const el = document.getElementById(toastId);
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), 1600);
    }

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => {
        v.hidden = (v.id !== id);
      });
    }

    document.getElementById('btn-start').addEventListener('click', () => {
      showView('view-register');
    });

    document.getElementById('btn-stats').addEventListener('click', () => {
      // TODO: перехід на екран статистики, коли він буде готовий
      showToast('toast-menu', 'Екран статистики — скоро тут');
    });

    document.getElementById('btn-register-start').addEventListener('click', () => {
      const nick = document.getElementById('reg-nick').value.trim();
      showView('view-game');
      window.GalagaGame.start();
    });

    document.getElementById('btn-retry').addEventListener('click', () => {
      window.GalagaGame.retry();
    });

    document.getElementById('btn-game-to-menu').addEventListener('click', () => {
      window.GalagaGame.stop();
      showView('view-menu');
    });
  
  (function() {
    'use strict';

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    const SPRITES = {
      player: 'assets/svg/player-drone.svg',
      enemy: 'assets/svg/enemy-drone.svg',
      shot: 'assets/svg/shot.svg'
    };

    const img = {};
    let loadedCount = 0;
    const spriteKeys = Object.keys(SPRITES);
    let ready = false;

    function preload(onDone) {
      spriteKeys.forEach(key => {
        const im = new Image();
        im.onload = () => {
          loadedCount++;
          if (loadedCount === spriteKeys.length) onDone();
        };
        im.src = SPRITES[key];
        img[key] = im;
      });
    }

    const COLS = 6;
    const GRID_MARGIN_X = 0.09;
    const GRID_TOP = 0.08;
    const ROW_GAP = 0.09;
    const ENEMY_SIZE = 0.115;
    const PLAYER_SIZE = 0.16;
    const PLAYER_Y = 0.85;
    const BULLET_SIZE = 0.045;
    const BULLET_SPEED = 0.62;
    const FIRE_INTERVAL = 0.42;
    const FORMATION_AMP = 0.045;
    const DESCENT_PER_SEC = 0.011;
    const LEAK_Y = 0.97;
    const ENEMY_BULLET_SIZE = 0.04;
    const ENEMY_BULLET_SPEED = 0.42;
    const ENEMY_FIRE_BASE_INTERVAL = 1.9;
    const ENEMY_FIRE_MIN_INTERVAL = 0.7;
    const PLAYER_INVULN_TIME = 1.2;

    let cssW = 0, cssH = 0;
    let state = null;
    let rafId = null;
    let lastTs = null;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      cssW = rect.width;
      cssH = rect.height;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function yNormFromWidthSize(widthFraction) {
      return (widthFraction * cssW) / cssH;
    }

    function colX(col) {
      const usable = 1 - GRID_MARGIN_X * 2;
      const step = usable / (COLS - 1);
      return GRID_MARGIN_X + step * col;
    }

    function spawnWave(waveNum) {
      const rows = Math.min(4 + Math.floor((waveNum - 1) / 2), 6);
      const enemies = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < COLS; c++) {
          enemies.push({ col: c, row: r, _x: colX(c), _y: GRID_TOP + r * ROW_GAP });
        }
      }
      return enemies;
    }

    function updateHud() {
      document.getElementById('hud-kills').textContent = state.kills;
      document.getElementById('hud-wave').textContent = state.wave;
      const hearts = document.querySelectorAll('#hud-lives .hud-heart');
      hearts.forEach((h, i) => {
        h.classList.toggle('lost', i >= state.lives);
      });
    }

    function resetGame() {
      state = {
        wave: 1,
        kills: 0,
        lives: 3,
        enemies: spawnWave(1),
        bullets: [],
        enemyBullets: [],
        particles: [],
        player: { x: 0.5, targetX: 0.5, invuln: 0 },
        time: 0,
        descent: 0,
        fireTimer: 0,
        enemyFireTimer: ENEMY_FIRE_BASE_INTERVAL * 0.6,
        gameOver: false
      };
      updateHud();
      document.getElementById('game-overlay').hidden = true;
    }

    function setPointerTarget(clientX) {
      const rect = canvas.getBoundingClientRect();
      let x = (clientX - rect.left) / rect.width;
      x = Math.max(0.08, Math.min(0.92, x));
      state.player.targetX = x;
    }

    let dragging = false;
    canvas.addEventListener('pointerdown', (e) => {
      dragging = true;
      setPointerTarget(e.clientX);
    });
    window.addEventListener('pointermove', (e) => {
      if (dragging) setPointerTarget(e.clientX);
    });
    window.addEventListener('pointerup', () => { dragging = false; });

    const keys = {};
    window.addEventListener('keydown', (e) => {
      if (['ArrowLeft', 'ArrowRight', 'a', 'A', 'd', 'D'].indexOf(e.key) !== -1) {
        keys[e.key] = true;
      }
    });
    window.addEventListener('keyup', (e) => { keys[e.key] = false; });

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const speed = 0.15 + Math.random() * 0.18;
        state.particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color
        });
      }
    }

    function triggerGameOver() {
      state.gameOver = true;
      document.getElementById('final-kills').textContent = state.kills;
      document.getElementById('game-overlay').hidden = false;
    }

    function update(dt) {
      if (!state || state.gameOver) return;
      state.time += dt;

      if (state.player.invuln > 0) state.player.invuln -= dt;

      if (keys['ArrowLeft'] || keys['a'] || keys['A']) state.player.targetX -= dt * 0.9;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) state.player.targetX += dt * 0.9;
      state.player.targetX = Math.max(0.08, Math.min(0.92, state.player.targetX));
      state.player.x += (state.player.targetX - state.player.x) * Math.min(1, dt * 12);

      state.fireTimer -= dt;
      if (state.fireTimer <= 0) {
        state.fireTimer = FIRE_INTERVAL;
        state.bullets.push({
          x: state.player.x,
          y: PLAYER_Y - yNormFromWidthSize(PLAYER_SIZE) * 0.45
        });
      }

      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.y -= BULLET_SPEED * dt;
        if (b.y < -0.05) state.bullets.splice(i, 1);
      }

      const waveFactor = 1 + (state.wave - 1) * 0.12;
      state.descent += DESCENT_PER_SEC * waveFactor * dt;
      const offsetX = Math.sin(state.time * (1 + (state.wave - 1) * 0.06)) * FORMATION_AMP;

      let hudNeedsUpdate = false;

      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const en = state.enemies[i];
        en._x = colX(en.col) + offsetX;
        en._y = GRID_TOP + en.row * ROW_GAP + state.descent;

        if (en._y > LEAK_Y) {
          state.enemies.splice(i, 1);
          state.lives--;
          spawnParticles(en._x, Math.min(en._y, 1), '#ff5050', 10);
          hudNeedsUpdate = true;
          if (state.lives <= 0) {
            updateHud();
            triggerGameOver();
            return;
          }
        }
      }

      const enemyHitHalfPx = (ENEMY_SIZE * cssW * 0.5) * 0.8;
      for (let bi = state.bullets.length - 1; bi >= 0; bi--) {
        const b = state.bullets[bi];
        let hitIndex = -1;
        for (let ei = 0; ei < state.enemies.length; ei++) {
          const en = state.enemies[ei];
          const dxPx = Math.abs(b.x - en._x) * cssW;
          const dyPx = Math.abs(b.y - en._y) * cssH;
          if (dxPx < enemyHitHalfPx && dyPx < enemyHitHalfPx) {
            hitIndex = ei;
            break;
          }
        }
        if (hitIndex !== -1) {
          const en = state.enemies[hitIndex];
          spawnParticles(en._x, en._y, '#ffd23f', 12);
          state.enemies.splice(hitIndex, 1);
          state.bullets.splice(bi, 1);
          state.kills++;
          hudNeedsUpdate = true;
        }
      }

      // ---- enemy attack: frontmost ship per column fires periodically ----
      state.enemyFireTimer -= dt;
      if (state.enemyFireTimer <= 0 && state.enemies.length > 0) {
        const fireInterval = Math.max(
          ENEMY_FIRE_MIN_INTERVAL,
          ENEMY_FIRE_BASE_INTERVAL - (state.wave - 1) * 0.15
        );
        state.enemyFireTimer = fireInterval * (0.7 + Math.random() * 0.6);

        const frontByCol = {};
        state.enemies.forEach(en => {
          if (!frontByCol[en.col] || en.row > frontByCol[en.col].row) {
            frontByCol[en.col] = en;
          }
        });
        const shooters = Object.values(frontByCol);
        const shooter = shooters[Math.floor(Math.random() * shooters.length)];
        if (shooter) {
          state.enemyBullets.push({
            x: shooter._x,
            y: shooter._y + yNormFromWidthSize(ENEMY_SIZE) * 0.4
          });
        }
      }

      for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
        const eb = state.enemyBullets[i];
        eb.y += ENEMY_BULLET_SPEED * dt;
        if (eb.y > 1.05) {
          state.enemyBullets.splice(i, 1);
        }
      }

      if (state.player.invuln <= 0) {
        const playerHitHalfPx = (PLAYER_SIZE * cssW * 0.5) * 0.55;
        for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
          const eb = state.enemyBullets[i];
          const dxPx = Math.abs(eb.x - state.player.x) * cssW;
          const dyPx = Math.abs(eb.y - PLAYER_Y) * cssH;
          if (dxPx < playerHitHalfPx && dyPx < playerHitHalfPx) {
            state.enemyBullets.splice(i, 1);
            state.lives--;
            state.player.invuln = PLAYER_INVULN_TIME;
            spawnParticles(state.player.x, PLAYER_Y, '#ff5050', 14);
            hudNeedsUpdate = true;
            if (state.lives <= 0) {
              updateHud();
              triggerGameOver();
              return;
            }
            break;
          }
        }
      }

      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt * 2.2;
        if (p.life <= 0) state.particles.splice(i, 1);
      }

      if (state.enemies.length === 0) {
        state.wave++;
        state.descent = 0;
        state.enemies = spawnWave(state.wave);
        hudNeedsUpdate = true;
      }

      if (hudNeedsUpdate) updateHud();
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      if (!state) return;

      const enemySizePx = ENEMY_SIZE * cssW;
      state.enemies.forEach(en => {
        const x = en._x * cssW - enemySizePx / 2;
        const y = en._y * cssH - enemySizePx / 2;
        ctx.drawImage(img.enemy, x, y, enemySizePx, enemySizePx);
      });

      const bulletSizePx = BULLET_SIZE * cssW;
      state.bullets.forEach(b => {
        ctx.drawImage(
          img.shot,
          b.x * cssW - bulletSizePx / 2,
          b.y * cssH - bulletSizePx / 2,
          bulletSizePx, bulletSizePx
        );
      });

      const enemyBulletSizePx = ENEMY_BULLET_SIZE * cssW;
      ctx.filter = 'hue-rotate(-50deg) saturate(1.4)';
      state.enemyBullets.forEach(eb => {
        ctx.drawImage(
          img.shot,
          eb.x * cssW - enemyBulletSizePx / 2,
          eb.y * cssH - enemyBulletSizePx / 2,
          enemyBulletSizePx, enemyBulletSizePx
        );
      });
      ctx.filter = 'none';

      const playerSizePx = PLAYER_SIZE * cssW;
      const blinking = state.player.invuln > 0 && Math.floor(state.player.invuln * 12) % 2 === 0;
      if (!blinking) {
        ctx.drawImage(
          img.player,
          state.player.x * cssW - playerSizePx / 2,
          PLAYER_Y * cssH - playerSizePx / 2,
          playerSizePx, playerSizePx
        );
      }

      state.particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        const r = 3 + (1 - p.life) * 2;
        ctx.beginPath();
        ctx.arc(p.x * cssW, p.y * cssH, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function loop(ts) {
      if (!lastTs) lastTs = ts;
      let dt = (ts - lastTs) / 1000;
      dt = Math.min(dt, 0.05);
      lastTs = ts;
      update(dt);
      draw();
      rafId = requestAnimationFrame(loop);
    }

    function startLoop() {
      if (rafId) return;
      lastTs = null;
      rafId = requestAnimationFrame(loop);
    }
    function stopLoop() {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    }

    window.addEventListener('resize', () => {
      const view = document.getElementById('view-game');
      if (view && !view.hidden) resize();
    });

    preload(() => { ready = true; });

    window.GalagaGame = {
      start() {
        if (!ready) { setTimeout(() => this.start(), 50); return; }
        resize();
        resetGame();
        startLoop();
      },
      retry() {
        resize();
        resetGame();
        startLoop();
      },
      stop() {
        stopLoop();
      }
    };
  })();

  </script>

</body>
</html>
